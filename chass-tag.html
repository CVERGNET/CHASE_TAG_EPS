<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chase Tag - Compteur EPS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'Helvetica', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 10px;
            position: relative;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .header {
            text-align: center;
            color: #ffd700;
            margin-bottom: 30px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.7);
        }

        .header h1 {
            font-size: 3.5em;
            margin-bottom: 10px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .header p {
            font-size: 1.2em;
            color: #00d4ff;
        }

        .config-section {
            background: linear-gradient(135deg, rgba(30, 30, 50, 0.95) 0%, rgba(20, 20, 40, 0.95) 100%);
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3), inset 0 0 10px rgba(0, 212, 255, 0.1);
        }

        .config-section h2 {
            color: #ffd700;
            margin-bottom: 20px;
            border-bottom: 2px solid #00d4ff;
            padding-bottom: 12px;
            font-size: 1.5em;
            text-transform: uppercase;
        }

        .config-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: bold;
            color: #00d4ff;
            margin-bottom: 8px;
            font-size: 0.95em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group input,
        .form-group select {
            padding: 12px;
            border: 2px solid #ffd700;
            border-radius: 8px;
            font-size: 1em;
            background: rgba(255, 255, 255, 0.95);
            color: #1a1a2e;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
            background: white;
        }

        .team-config {
            background: rgba(20, 20, 40, 0.8);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 2px solid #333;
        }

        .team-config h3 {
            color: white;
            padding: 10px 12px;
            border-radius: 5px;
            margin-bottom: 12px;
            font-size: 1.2em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .team-1 h3 {
            background: linear-gradient(135deg, #ff4757 0%, #ee5a6f 100%);
            box-shadow: 0 4px 8px rgba(255, 71, 87, 0.3);
        }

        .team-2 h3 {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            box-shadow: 0 4px 8px rgba(0, 212, 255, 0.3);
        }

        .team-name-input {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            align-items: center;
        }

        .team-name-input input {
            flex: 1;
            padding: 10px;
            border: 2px solid #ffd700;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.95);
            color: #1a1a2e;
            font-weight: bold;
        }

        .team-name-input label {
            color: #00d4ff;
            font-weight: bold;
            min-width: 120px;
        }

        .players-input {
            background: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .player-input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
            align-items: center;
        }

        .player-input-row input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 0.9em;
        }

        .player-input-row span {
            color: #666;
            min-width: 50px;
            font-weight: bold;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        button {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #1a1a2e;
            flex: 1;
            min-width: 150px;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(255, 215, 0, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #ff4757 0%, #ee5a6f 100%);
            color: white;
        }

        .btn-secondary:hover {
            background: linear-gradient(135deg, #ff6874 0%, #ff7f8c 100%);
        }

        .btn-warning {
            background: linear-gradient(135deg, #ffa502 0%, #ff8c00 100%);
            color: white;
        }

        .btn-warning:hover {
            background: linear-gradient(135deg, #ffb84d 0%, #ff9933 100%);
        }

        .btn-danger {
            background: #555;
            color: white;
            padding: 8px 16px;
            font-size: 0.9em;
        }

        .btn-danger:hover {
            background: #333;
        }

        .game-section {
            display: none;
        }

        .game-section.active {
            display: block;
        }

        .game-header {
            background: linear-gradient(135deg, rgba(30, 30, 50, 0.95) 0%, rgba(20, 20, 40, 0.95) 100%);
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .manche-info {
            text-align: center;
            color: #ffd700;
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .mode-info {
            text-align: center;
            color: #00d4ff;
            font-size: 1.2em;
            margin-bottom: 15px;
            padding: 12px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 8px;
            border: 1px solid #00d4ff;
            text-transform: uppercase;
        }

        .scores-display {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
            text-align: center;
        }

        .score-box {
            padding: 20px;
            border-radius: 10px;
            color: white;
            font-size: 2em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .team-1-score {
            background: linear-gradient(135deg, #ff4757 0%, #ee5a6f 100%);
            box-shadow: 0 4px 12px rgba(255, 71, 87, 0.3);
        }

        .team-2-score {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            box-shadow: 0 4px 12px rgba(0, 212, 255, 0.3);
        }

        .current-match {
            text-align: center;
            font-size: 1.3em;
            color: #ffd700;
            padding: 15px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 8px;
            margin-bottom: 15px;
            border: 2px solid #ffd700;
            text-transform: uppercase;
        }

        .match-progress {
            text-align: center;
            font-size: 1em;
            color: #00d4ff;
            padding: 10px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #00d4ff;
        }

        .timer-section {
            text-align: center;
            background: linear-gradient(135deg, #000000 0%, #1a1a2e 100%);
            color: #ffd700;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 3px solid #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
        }

        .timer-section > div:first-child {
            font-size: 1.3em;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .timer-display {
            font-size: 5em;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            margin: 20px 0;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .timer-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-timer {
            padding: 15px 30px;
            font-size: 1.1em;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #1a1a2e;
            font-weight: bold;
        }

        .btn-timer:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(255, 215, 0, 0.4);
        }

        .btn-timer.stop {
            background: linear-gradient(135deg, #ff4757 0%, #ee5a6f 100%);
            color: white;
        }

        .game-board {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .team-board {
            background: linear-gradient(135deg, rgba(30, 30, 50, 0.95) 0%, rgba(20, 20, 40, 0.95) 100%);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .team-1 {
            border-top: 5px solid #ff4757;
        }

        .team-2 {
            border-top: 5px solid #00d4ff;
        }

        .team-title {
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .team-1 .team-title {
            color: #ff4757;
        }

        .team-2 .team-title {
            color: #00d4ff;
        }

        .role-badge {
            font-size: 0.7em;
            padding: 6px 12px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
        }

        .chat-badge {
            background: linear-gradient(135deg, #ff4757 0%, #ee5a6f 100%);
        }

        .souris-badge {
            background: linear-gradient(135deg, #2ed573 0%, #26de81 100%);
        }

        .players-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .player-button {
            padding: 12px;
            border: 2px solid #333;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            text-align: left;
            color: white;
        }

        .team-1 .player-button {
            border-color: #ff4757;
        }

        .team-1 .player-button:hover:not(.disabled):not(.played) {
            background: rgba(255, 71, 87, 0.3);
            border-color: #ff4757;
            transform: translateX(5px);
        }

        .team-2 .player-button {
            border-color: #00d4ff;
        }

        .team-2 .player-button:hover:not(.disabled):not(.played) {
            background: rgba(0, 212, 255, 0.3);
            border-color: #00d4ff;
            transform: translateX(5px);
        }

        .player-button.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .player-button.played {
            opacity: 0.5;
            background: rgba(100, 100, 100, 0.3);
            border-color: #666;
            cursor: not-allowed;
        }

        .player-name {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 3px;
            color: white;
        }

        .player-stats {
            font-size: 0.85em;
            color: #aaa;
        }

        .stats-section {
            background: linear-gradient(135deg, rgba(30, 30, 50, 0.95) 0%, rgba(20, 20, 40, 0.95) 100%);
            border: 2px solid #ffd700;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            margin-bottom: 20px;
        }

        .stats-section h2 {
            color: #ffd700;
            margin-bottom: 20px;
            border-bottom: 2px solid #00d4ff;
            padding-bottom: 12px;
            font-size: 1.5em;
            text-transform: uppercase;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .player-stat-card {
            background: rgba(255, 255, 255, 0.08);
            border-left: 4px solid;
            padding: 15px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .team-1 .player-stat-card {
            border-left-color: #ff4757;
        }

        .team-2 .player-stat-card {
            border-left-color: #00d4ff;
        }

        .stat-name {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 10px;
            color: #ffd700;
            text-transform: uppercase;
        }

        .stat-line {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 0.95em;
            color: #ccc;
        }

        .stat-value {
            font-weight: bold;
            color: #00d4ff;
        }

        .ranking-section {
            background: linear-gradient(135deg, rgba(30, 30, 50, 0.95) 0%, rgba(20, 20, 40, 0.95) 100%);
            border: 2px solid #00d4ff;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
            margin-bottom: 20px;
        }

        .ranking-section h2 {
            color: #00d4ff;
            margin-bottom: 20px;
            border-bottom: 2px solid #ffd700;
            padding-bottom: 12px;
            font-size: 1.5em;
            text-transform: uppercase;
        }

        .ranking-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .ranking-card {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid;
            border-radius: 10px;
            padding: 15px;
        }

        .ranking-card h3 {
            color: #ffd700;
            margin-bottom: 15px;
            font-size: 1.2em;
            text-transform: uppercase;
            text-align: center;
        }

        .ranking-list {
            list-style: none;
        }

        .ranking-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
            color: white;
        }

        .ranking-position {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ranking-medal {
            font-size: 1.5em;
            min-width: 30px;
        }

        .ranking-name {
            color: #00d4ff;
            font-weight: bold;
        }

        .ranking-time {
            color: #ffd700;
            font-weight: bold;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(30, 30, 50, 0.98) 0%, rgba(20, 20, 40, 0.98) 100%);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
            max-width: 600px;
            width: 90%;
            text-align: center;
            max-height: 90vh;
            overflow-y: auto;
            border: 2px solid #ffd700;
        }

        .modal h2 {
            color: #ffd700;
            margin-bottom: 20px;
            font-size: 2em;
            text-transform: uppercase;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }

            .timer-display {
                font-size: 3em;
            }

            .game-board {
                grid-template-columns: 1fr;
            }

            .config-row {
                grid-template-columns: 1fr;
            }

            .team-title {
                flex-direction: column;
                align-items: flex-start;
            }

            .role-badge {
                margin-top: 8px;
            }

            .scores-display {
                grid-template-columns: 1fr;
            }

            .ranking-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏃‍♂️ CHASE TAG 🏃‍♀️</h1>
            <p>🌃 Urban Challenge - Jeu d'EPS</p>
        </div>

        <div class="config-section" id="configSection">
            <h2>⚙️ Configuration</h2>

            <div class="config-row">
                <div class="form-group">
                    <label for="matchFormat">Format de jeu :</label>
                    <select id="matchFormat" onchange="updatePlayerInputs()">
                        <option value="1v1">1 contre 1</option>
                        <option value="2v2">2 contre 2</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="nbManches">Nombre de manches :</label>
                    <input type="number" id="nbManches" min="1" max="20" value="3">
                </div>
                <div class="form-group">
                    <label for="mancheDuration">Durée affrontement (sec) :</label>
                    <input type="range" id="mancheDuration" min="10" max="30" value="20">
                    <div style="text-align: center; color: #ffd700; font-weight: bold;">
                        <span id="durationDisplay">20</span>s
                    </div>
                </div>
            </div>

            <div class="config-row">
                <div class="form-group">
                    <label for="gameMode">Mode de jeu :</label>
                    <select id="gameMode">
                        <option value="random">🎲 Aléatoire</option>
                        <option value="challenge">🎯 Défi (Ordre)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="roleMode">Rôles :</label>
                    <select id="roleMode">
                        <option value="fixed">🔒 Fixe par manche</option>
                        <option value="alternate">🔄 Alternance</option>
                    </select>
                </div>
            </div>

            <div class="team-config team-1">
                <h3>🔴 ÉQUIPE 1</h3>
                <div class="team-name-input">
                    <label for="team1Name">Nom de l'équipe :</label>
                    <input type="text" id="team1Name" placeholder="Équipe 1" value="Équipe 1">
                </div>
                <div class="players-input">
                    <div id="team1Players"></div>
                </div>
            </div>

            <div class="team-config team-2">
                <h3>🔵 ÉQUIPE 2</h3>
                <div class="team-name-input">
                    <label for="team2Name">Nom de l'équipe :</label>
                    <input type="text" id="team2Name" placeholder="Équipe 2" value="Équipe 2">
                </div>
                <div class="players-input">
                    <div id="team2Players"></div>
                </div>
            </div>

            <div class="button-group">
                <button class="btn-primary" onclick="addPlayerRow(1)">+ Équipe 1</button>
                <button class="btn-primary" onclick="addPlayerRow(2)">+ Équipe 2</button>
            </div>

            <div class="button-group" style="margin-top: 20px;">
                <button class="btn-primary" onclick="startGame()" style="background: linear-gradient(135deg, #2ed573 0%, #26de81 100%); font-size: 1.3em;">
                    ▶️ DÉMARRER
                </button>
            </div>
        </div>

        <div class="game-section" id="gameSection">
            <div class="game-header">
                <div class="manche-info">
                    Manche <span id="mancheCounter">1</span> / <span id="mancheTotal">3</span>
                </div>
                <div class="mode-info" id="modeDisplay"></div>
                
                <div class="scores-display">
                    <div class="score-box team-1-score">
                        <span id="team1DisplayName">Équipe 1</span><br>
                        <span id="team1Score">0</span>
                    </div>
                    <div class="score-box team-2-score">
                        <span id="team2DisplayName">Équipe 2</span><br>
                        <span id="team2Score">0</span>
                    </div>
                </div>

                <div class="match-progress" id="matchProgress"></div>
                <div class="current-match" id="currentMatch"></div>
            </div>

            <div class="timer-section">
                <div>⏱️ Temps restant</div>
                <div class="timer-display" id="timerDisplay">00:20</div>
                <div class="timer-controls">
                    <button class="btn-timer" id="btnStartTimer" onclick="toggleTimer()">▶️ DÉMARRER</button>
                    <button class="btn-timer stop" id="btnStopTimer" onclick="stopTimer()" style="display:none;">⏹️ ARRÊTER</button>
                    <button class="btn-timer" onclick="resetTimer()">🔄 RESET</button>
                </div>
            </div>

            <div class="game-board">
                <div class="team-board team-1">
                    <div class="team-title">
                        <span id="team1TitleName">Équipe 1</span>
                        <span class="role-badge chat-badge" id="team1Role">CHAT</span>
                    </div>
                    <div class="players-list" id="team1GamePlayers"></div>
                </div>

                <div class="team-board team-2">
                    <div class="team-title">
                        <span id="team2TitleName">Équipe 2</span>
                        <span class="role-badge souris-badge" id="team2Role">SOURIS</span>
                    </div>
                    <div class="players-list" id="team2GamePlayers"></div>
                </div>
            </div>

            <div class="button-group">
                <button class="btn-primary" onclick="nextMatch()" style="background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%); color: #1a1a2e;">
                    ▶️ AFFRONTEMENT SUIVANT
                </button>
                <button class="btn-warning" onclick="undoLastTouch()" style="display:none;" id="btnUndo">
                    ↩️ ANNULER DERNIÈRE TOUCHE
                </button>
                <button class="btn-secondary" onclick="endGame()">🏁 FIN MANCHE</button>
            </div>

            <div class="stats-section">
                <h2>📊 Statistiques Individuelles</h2>
                <div class="stats-grid" id="statsGrid"></div>
            </div>

            <div class="ranking-section" id="rankingSection">
                <h2>🏆 Classements</h2>
                <div class="ranking-grid" id="rankingGrid"></div>
            </div>

            <div class="button-group">
                <button class="btn-secondary" onclick="backToConfig()">← RETOUR CONFIG</button>
            </div>
        </div>
    </div>

    <!-- MODAL FIN DU JEU -->
    <div class="modal" id="endGameModal">
        <div class="modal-content">
            <h2>🏁 FIN DU JEU</h2>
            <div id="resultsText" style="text-align: left; background: rgba(0, 212, 255, 0.1); padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #00d4ff; color: #ccc;"></div>
            <div class="modal-buttons">
                <button class="btn-primary" onclick="closeEndGameModal()">
                    Fermer
                </button>
            </div>
        </div>
    </div>

    <script>
        // Son de fin
        function playEndSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = 800;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        let gameData = {
            config: {
                matchFormat: '1v1',
                nbManches: 3,
                mancheDuration: 20,
                gameMode: 'random',
                roleMode: 'fixed'
            },
            teams: {
                1: { name: 'Équipe 1', players: [], score: 0, playedPlayers: [] },
                2: { name: 'Équipe 2', players: [], score: 0, playedPlayers: [] }
            },
            currentManche: 1,
            currentMatch: null,
            currentMatchTouches: 0,
            lastTouch: null,
            timer: {
                timeLeft: 0,
                isRunning: false,
                interval: null
            }
        };

        document.getElementById('matchFormat').addEventListener('change', (e) => {
            gameData.config.matchFormat = e.target.value;
            updatePlayerInputs();
        });

        document.getElementById('mancheDuration').addEventListener('input', (e) => {
            gameData.config.mancheDuration = parseInt(e.target.value);
            document.getElementById('durationDisplay').textContent = e.target.value;
        });

        document.getElementById('nbManches').addEventListener('input', (e) => {
            gameData.config.nbManches = parseInt(e.target.value);
        });

        document.getElementById('gameMode').addEventListener('change', (e) => {
            gameData.config.gameMode = e.target.value;
        });

        document.getElementById('roleMode').addEventListener('change', (e) => {
            gameData.config.roleMode = e.target.value;
        });

        function updatePlayerInputs() {
            const format = gameData.config.matchFormat;
            const requiredPlayers = format === '1v1' ? 1 : 2;

            document.getElementById('team1Players').innerHTML = '';
            document.getElementById('team2Players').innerHTML = '';

            for (let i = 0; i < requiredPlayers; i++) {
                addPlayerRow(1);
                addPlayerRow(2);
            }
        }

        function addPlayerRow(teamNumber) {
            const teamElement = document.getElementById(`team${teamNumber}Players`);
            const playerCount = teamElement.querySelectorAll('.player-input-row').length + 1;

            const playerRow = document.createElement('div');
            playerRow.className = 'player-input-row';
            playerRow.innerHTML = `
                <span>J${playerCount}</span>
                <input type="text" placeholder="Nom du joueur" class="player-input">
                <button type="button" class="btn-danger" onclick="this.parentElement.remove()">✕</button>
            `;
            teamElement.appendChild(playerRow);
        }

        function startGame() {
            const team1Name = document.getElementById('team1Name').value;
            const team2Name = document.getElementById('team2Name').value;

            gameData.teams[1].name = team1Name;
            gameData.teams[2].name = team2Name;

            const team1Players = Array.from(document.querySelectorAll('#team1Players .player-input')).map(input => input.value.trim()).filter(v => v);
            const team2Players = Array.from(document.querySelectorAll('#team2Players .player-input')).map(input => input.value.trim()).filter(v => v);

            if (team1Players.length === 0 || team2Players.length === 0) {
                alert('Veuillez entrer au moins un joueur par équipe!');
                return;
            }

            gameData.teams[1].players = team1Players.map(name => ({ name, touches: 0, matchesJoued: 0 }));
            gameData.teams[2].players = team2Players.map(name => ({ name, touches: 0, matchesJoued: 0 }));

            document.getElementById('configSection').style.display = 'none';
            document.getElementById('gameSection').classList.add('active');
            document.getElementById('mancheTotal').textContent = gameData.config.nbManches;

            initializeMatch();
        }

        function initializeMatch() {
            gameData.currentMatchTouches = 0;
            gameData.lastTouch = null;

            document.getElementById('btnUndo').style.display = 'none';
            document.getElementById('btnStartTimer').style.display = 'inline-block';
            document.getElementById('btnStopTimer').style.display = 'none';

            const mode = gameData.config.gameMode === 'random' ? 'ALÉATOIRE' : 'DÉFI';
            const roleMode = gameData.config.roleMode === 'fixed' ? 'Fixe' : 'Alternance';
            document.getElementById('modeDisplay').textContent = `Mode: ${mode} | Rôles: ${roleMode}`;

            selectNextMatch();
            displayPlayers();
            resetTimer();
            updateStats();
            updateRankings();
        }

        function selectNextMatch() {
            let team1ChatRole = gameData.currentManche % 2 === 1;
            if (gameData.config.roleMode === 'fixed') {
                team1ChatRole = true;
            }

            const team1Idx = Math.floor(Math.random() * gameData.teams[1].players.length);
            const team2Idx = Math.floor(Math.random() * gameData.teams[2].players.length);

            gameData.currentMatch = {
                team1Player: team1Idx,
                team2Player: team2Idx,
                team1IsChat: team1ChatRole
            };

            const player1 = gameData.teams[1].players[team1Idx].name;
            const player2 = gameData.teams[2].players[team2Idx].name;
            const role1 = team1ChatRole ? 'CHAT' : 'SOURIS';
            const role2 = team1ChatRole ? 'SOURIS' : 'CHAT';

            document.getElementById('team1Role').textContent = role1;
            document.getElementById('team2Role').textContent = role2;
            document.getElementById('team1Role').className = 'role-badge ' + (team1ChatRole ? 'chat-badge' : 'souris-badge');
            document.getElementById('team2Role').className = 'role-badge ' + (team1ChatRole ? 'souris-badge' : 'chat-badge');

            document.getElementById('currentMatch').textContent = `${player1} (${role1}) vs ${player2} (${role2})`;

            const totalMatches = gameData.teams[1].players.length * gameData.teams[2].players.length;
            const currentMatchNum = gameData.currentManche * Math.floor(Math.random() * 100) % totalMatches + 1;
            document.getElementById('matchProgress').textContent = `Affrontement ${currentMatchNum} de ${totalMatches}`;
        }

        function displayPlayers() {
            const team1Board = document.getElementById('team1GamePlayers');
            const team2Board = document.getElementById('team2GamePlayers');

            team1Board.innerHTML = '';
            team2Board.innerHTML = '';

            gameData.teams[1].players.forEach((player, idx) => {
                const btn = document.createElement('button');
                btn.className = 'player-button';
                if (idx !== gameData.currentMatch.team1Player) {
                    btn.classList.add('disabled');
                }
                btn.innerHTML = `<div class="player-name">${player.name}</div><div class="player-stats">Touches: ${player.touches} | Matchs: ${player.matchesJoued}</div>`;
                btn.onclick = () => recordTouch(1, idx);
                team1Board.appendChild(btn);
            });

            gameData.teams[2].players.forEach((player, idx) => {
                const btn = document.createElement('button');
                btn.className = 'player-button';
                if (idx !== gameData.currentMatch.team2Player) {
                    btn.classList.add('disabled');
                }
                btn.innerHTML = `<div class="player-name">${player.name}</div><div class="player-stats">Touches: ${player.touches} | Matchs: ${player.matchesJoued}</div>`;
                btn.onclick = () => recordTouch(2, idx);
                team2Board.appendChild(btn);
            });
        }

        function recordTouch(teamNum, playerIdx) {
            // Prevent recording touch if timer is not running
            if (!gameData.timer.isRunning) {
                alert('⏱️ Veuillez démarrer le chrono avant de pouvoir enregistrer une touche!');
                return;
            }

            if (playerIdx !== gameData.currentMatch[`team${teamNum}Player`]) {
                return;
            }

            gameData.teams[teamNum].players[playerIdx].touches++;
            gameData.teams[teamNum].score++;
            gameData.currentMatchTouches++;

            gameData.lastTouch = { teamNum, playerIdx };
            document.getElementById('btnUndo').style.display = 'inline-block';

            document.getElementById(`team${teamNum}Score`).textContent = gameData.teams[teamNum].score;
            updateStats();
        }

        function undoLastTouch() {
            if (!gameData.lastTouch) return;

            const { teamNum, playerIdx } = gameData.lastTouch;
            gameData.teams[teamNum].players[playerIdx].touches--;
            gameData.teams[teamNum].score--;
            gameData.currentMatchTouches--;

            document.getElementById(`team${teamNum}Score`).textContent = gameData.teams[teamNum].score;
            gameData.lastTouch = null;
            document.getElementById('btnUndo').style.display = 'none';
            updateStats();
        }

        function nextMatch() {
            gameData.teams[1].players[gameData.currentMatch.team1Player].matchesJoued++;
            gameData.teams[2].players[gameData.currentMatch.team2Player].matchesJoued++;

            gameData.currentMatchTouches = 0;
            selectNextMatch();
            displayPlayers();
            resetTimer();
            updateStats();
        }

        function toggleTimer() {
            if (gameData.timer.isRunning) {
                stopTimer();
            } else {
                startTimer();
            }
        }

        function startTimer() {
            if (gameData.timer.timeLeft === 0) {
                gameData.timer.timeLeft = gameData.config.mancheDuration;
            }
            gameData.timer.isRunning = true;
            document.getElementById('btnStartTimer').style.display = 'none';
            document.getElementById('btnStopTimer').style.display = 'inline-block';

            gameData.timer.interval = setInterval(() => {
                gameData.timer.timeLeft--;
                updateTimerDisplay();

                if (gameData.timer.timeLeft === 0) {
                    stopTimer();
                    playEndSound();
                }
            }, 1000);
        }

        function stopTimer() {
            gameData.timer.isRunning = false;
            if (gameData.timer.interval) {
                clearInterval(gameData.timer.interval);
                gameData.timer.interval = null;
            }
            document.getElementById('btnStartTimer').style.display = 'inline-block';
            document.getElementById('btnStopTimer').style.display = 'none';
        }

        function resetTimer() {
            stopTimer();
            gameData.timer.timeLeft = gameData.config.mancheDuration;
            updateTimerDisplay();
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(gameData.timer.timeLeft / 60);
            const seconds = gameData.timer.timeLeft % 60;
            document.getElementById('timerDisplay').textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function updateStats() {
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = '';

            for (let teamNum = 1; teamNum <= 2; teamNum++) {
                gameData.teams[teamNum].players.forEach(player => {
                    const card = document.createElement('div');
                    card.className = `player-stat-card team-${teamNum}`;
                    card.innerHTML = `
                        <div class="stat-name">${player.name}</div>
                        <div class="stat-line">
                            <span>Touches:</span>
                            <span class="stat-value">${player.touches}</span>
                        </div>
                        <div class="stat-line">
                            <span>Matchs joués:</span>
                            <span class="stat-value">${player.matchesJoued}</span>
                        </div>
                        <div class="stat-line">
                            <span>Moyenne:</span>
                            <span class="stat-value">${player.matchesJoued > 0 ? (player.touches / player.matchesJoued).toFixed(2) : '0.00'}</span>
                        </div>
                    `;
                    statsGrid.appendChild(card);
                });
            }
        }

        function updateRankings() {
            const rankingGrid = document.getElementById('rankingGrid');
            rankingGrid.innerHTML = '';

            const allPlayers = [];
            gameData.teams[1].players.forEach(p => allPlayers.push({ ...p, team: 1 }));
            gameData.teams[2].players.forEach(p => allPlayers.push({ ...p, team: 2 }));

            allPlayers.sort((a, b) => {
                const avgA = a.matchesJoued > 0 ? a.touches / a.matchesJoued : 0;
                const avgB = b.matchesJoued > 0 ? b.touches / b.matchesJoued : 0;
                return avgB - avgA;
            });

            const medals = ['🥇', '🥈', '🥉'];

            const card = document.createElement('div');
            card.className = 'ranking-card';
            card.style.borderColor = '#ffd700';
            card.innerHTML = '<h3>Meilleurs joueurs</h3><ul class="ranking-list">' +
                allPlayers.slice(0, 10).map((p, i) => `
                    <li>
                        <div class="ranking-position">
                            <span class="ranking-medal">${medals[i] || `${i + 1}.`}</span>
                            <span class="ranking-name">${p.name}</span>
                        </div>
                        <span class="ranking-time">${p.matchesJoued > 0 ? (p.touches / p.matchesJoued).toFixed(2) : '0.00'} touches/match</span>
                    </li>
                `).join('') +
                '</ul>';
            rankingGrid.appendChild(card);
        }

        function endGame() {
            stopTimer();

            let resultsHTML = '<h3 style="color: #ffd700; margin-bottom: 15px;">Résultats finaux</h3>';
            resultsHTML += `<p style="margin: 10px 0;"><strong>Score Équipe 1 (${gameData.teams[1].name}):</strong> ${gameData.teams[1].score}</p>`;
            resultsHTML += `<p style="margin: 10px 0;"><strong>Score Équipe 2 (${gameData.teams[2].name}):</strong> ${gameData.teams[2].score}</p>`;

            if (gameData.teams[1].score > gameData.teams[2].score) {
                resultsHTML += `<p style="margin: 10px 0; color: #2ed573; font-weight: bold;">🎉 Équipe 1 (${gameData.teams[1].name}) gagne!</p>`;
            } else if (gameData.teams[2].score > gameData.teams[1].score) {
                resultsHTML += `<p style="margin: 10px 0; color: #2ed573; font-weight: bold;">🎉 Équipe 2 (${gameData.teams[2].name}) gagne!</p>`;
            } else {
                resultsHTML += `<p style="margin: 10px 0; color: #ffd700; font-weight: bold;">⚖️ Égalité!</p>`;
            }

            document.getElementById('resultsText').innerHTML = resultsHTML;
            document.getElementById('endGameModal').classList.add('active');
        }

        function closeEndGameModal() {
            document.getElementById('endGameModal').classList.remove('active');
            backToConfig();
        }

        function backToConfig() {
            document.getElementById('gameSection').classList.remove('active');
            document.getElementById('configSection').style.display = 'block';
            gameData = {
                config: gameData.config,
                teams: {
                    1: { name: 'Équipe 1', players: [], score: 0, playedPlayers: [] },
                    2: { name: 'Équipe 2', players: [], score: 0, playedPlayers: [] }
                },
                currentManche: 1,
                currentMatch: null,
                currentMatchTouches: 0,
                lastTouch: null,
                timer: {
                    timeLeft: 0,
                    isRunning: false,
                    interval: null
                }
            };
        }

        // Initialize player inputs on page load
        updatePlayerInputs();
    </script>
</body>
</html>
